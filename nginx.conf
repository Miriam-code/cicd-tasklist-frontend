server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Sert les fichiers statiques, et redirige toute route inconnue vers
    # index.html pour laisser React Router (ou la nav côté client) gérer les routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Mise en cache longue durée pour les assets buildés (JS/CSS hashés par Vite)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Compression gzip pour réduire la taille des fichiers servis
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
